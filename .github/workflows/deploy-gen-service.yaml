name: CI/CD Pipeline
on:
  push:
    branches: [ "backend-A" ]
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/cv-gen-microservice:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/cv-gen-microservice:latest
