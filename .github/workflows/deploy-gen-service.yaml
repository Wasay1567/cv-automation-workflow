name: CI/CD Pipeline
on:
  push:
    branches: [ "backend-A" ]
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/cv-gen-microservice:latest ./backend
          docker push ${{ secrets.DOCKER_USERNAME }}/cv-gen-microservice:latest
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/app-directory
            echo "${{ secrets.ENV_FILE }}" > .env  # Recreates the .env file on EC2
            docker stop cv-gen-microservice || true
            docker rm cv-gen-microservice || true

            # Free disk space before pulling the new image (Playwright layers are large)
            docker image prune -af || true
            docker container prune -f || true
            docker builder prune -af || true

            docker pull ${{ secrets.DOCKER_USERNAME }}/cv-gen-microservice:latest

            # Run container using the recreated .env file
            docker run -d --name cv-gen-microservice --env-file .env -p 8080:8080 ${{ secrets.DOCKER_USERNAME }}/cv-gen-microservice:latest
